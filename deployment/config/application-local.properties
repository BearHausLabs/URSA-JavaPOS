management.endpoints.web.exposure.include=info, health, metrics
logging.file.path=C:/URSA/possum/logs
spring.output.ansi.enabled=always
management.influx.metrics.export.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.com.target.devicemanager.components.scanner=TRACE
logging.level.com.target.devicemanager.common=TRACE
spring.config.import=optional:file:config/possum-config.yml

# --- Device enablement ---
# Only the Epson TM-m50 printer is real hardware right now.
# Disable everything else to prevent bean-creation crashes on startup.
possum.device.cashdrawer.enabled=false
possum.device.scanner.enabled=false
possum.device.micr.enabled=false
possum.device.linedisplay.enabled=false
possum.device.scale.enabled=false
possum.device.keyboard.enabled=false
possum.device.keylock.enabled=false
possum.device.tone.enabled=false
possum.device.msr.enabled=false
