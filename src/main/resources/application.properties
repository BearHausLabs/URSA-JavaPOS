# Server
server.port=1994

# Actuator
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=info, health

# Logging
logging.file.path=/var/log/ursa/io/
springdoc.swagger-ui.disable-swagger-default-url=true

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Import workstation config (device-enable properties)
spring.config.import=optional:file:./config/possum-config.yml,optional:file:./possum-config.yml
